name: Import application source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Import source files
        run: |
          tar -xzf question-bank-studio-source.tar.gz
          rm question-bank-studio-source.tar.gz question-bank-studio.bundle
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Import application source"
          git push
