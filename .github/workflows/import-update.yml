name: Import secure signup release
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import verified source
        run: |
          tar -xzf question-bank-studio-update.tar.gz
          rm question-bank-studio-update.tar.gz
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Secure signup and add searchable text documents"
          git push
